<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>卢浮宫馆藏 · 语音讲解</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>卢浮宫馆藏语音讲解</h1>
    </header>

    <main>
      <section class="search-panel" aria-label="筛选与搜索">
        <div class="filters">
          <div class="field">
            <label for="filter-wing">馆区</label>
            <select id="filter-wing">
              <option value="">全部馆区</option>
            </select>
          </div>
          <div class="field">
            <label for="filter-floor">楼层</label>
            <select id="filter-floor">
              <option value="">全部楼层</option>
            </select>
          </div>
        </div>
        <label for="q">按藏品中文名、法文名或馆藏编号搜索</label>
        <div class="row">
          <input
            id="q"
            type="search"
            autocomplete="off"
            placeholder="例如：蒙娜丽莎、Joconde、INV 779…"
          />
          <button type="button" id="btn-clear">清空</button>
        </div>
        <p class="hint" id="status">正在加载目录…</p>
      </section>

      <section id="results" class="results" aria-live="polite"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
